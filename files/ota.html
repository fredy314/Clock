<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock OTA Update</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .ota-card { max-width: 500px; margin: 0 auto; text-align: left; }
        .form-group { margin-bottom: 20px; }
        input[type="file"] { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px dashed var(--border-color); border-radius: 8px; color: var(--text-color); cursor: pointer; }
        .btn-submit { width: 100%; padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        #progress { margin-top: 20px; display: none; }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: width 0.3s; }
        #message { margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Оновлення ПЗ</h1>
            <a href="/" class="nav-link">Назад</a>
        </header>

        <div class="card ota-card">
            <div style="margin-bottom: 15px; font-size: 0.9em; opacity: 0.7;">
                Проект: <span id="cur_project" style="font-weight: 600;">...</span><br>
                Версія: <span id="cur_version" style="font-weight: 600;">...</span>
            </div>
            <div class="card-label">Оберіть файл прошивки (.bin)</div>
            <form id="upload_form" enctype="multipart/form-data" method="post">
                <div class="form-group">
                    <input type="file" name="update" id="file_input" accept=".bin">
                </div>
                
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" name="force" id="force_input" value="1">
                        Дозволити старішу версію
                    </label>
                </div>

                <div class="form-group">
                    <label>Тип оновлення:</label>
                    <select name="type" id="type_input" style="width: 100%; padding: 8px; background: #161b22; color: #fff; border: 1px solid #30363d; border-radius: 8px;">
                        <option value="app">Прошивка (Application)</option>
                        <option value="spiffs">Веб-файли (SPIFFS)</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" id="btn_upload">Почати оновлення</button>
            </form>

            <div id="progress">
                <div class="card-label" id="progress_text">Завантаження: 0%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress_fill"></div>
                </div>
            </div>
            <div id="message"></div>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('upload_form');
        const fileInput = document.getElementById('file_input');
        const btnUpload = document.getElementById('btn_upload');
        const progressDiv = document.getElementById('progress');
        const progressFill = document.getElementById('progress_fill');
        const progressText = document.getElementById('progress_text');
        const message = document.getElementById('message');

        // Завантаження поточної інформації
        fetch('/status')
            .then(res => res.json())
            .then(data => {
                document.getElementById('cur_project').innerText = data.project || 'Clock';
                document.getElementById('cur_version').innerText = data.version || '1.0.0';
            })
            .catch(err => console.error('Error fetching status:', err));

        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const file = fileInput.files[0];
            const type = document.getElementById('type_input').value;
            const force = document.getElementById('force_input').checked ? '1' : '0';
            
            const url = `/ota.html?type=${type}&force=${force}`;
            
            btnUpload.disabled = true;
            progressDiv.style.display = 'block';
            message.innerText = 'Завантаження розпочато... Зачекайте.';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader("Content-Type", "application/octet-stream");

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressFill.style.width = percent + '%';
                    progressText.innerText = `Завантаження: ${percent}%`;
                }
            };

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    btnUpload.disabled = false;
                    if (xhr.status === 200) {
                        message.innerText = 'Успішно! Перезавантаження...';
                        message.style.color = '#3fb950';
                        if (type === 'app') {
                            setTimeout(() => window.location.href = '/', 5000);
                        }
                    } else {
                        message.innerText = 'Помилка: ' + xhr.responseText;
                        message.style.color = '#f85149';
                    }
                }
            };

            xhr.send(file);
        });
    </script>
</body>
</html>
